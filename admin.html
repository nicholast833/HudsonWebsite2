<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hudson Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="content.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f3f4f6;
            font-family: sans-serif;
        }

        #main-container {
            display: flex;
            height: calc(100vh - 80px);
            width: 100vw;
            overflow: hidden;
            padding: 15px;
            gap: 10px;
        }

        /* Collapsible Layout Helpers */
        .pane-wrapper {
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
            flex: 1 1 0%;
        }

        .pane-wrapper.collapsed {
            flex: 0 0 0px !important;
            min-width: 0 !important;
            margin-right: -15px;
        }

        .pane-inner {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 0.25rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .pane-wrapper.collapsed>.pane-inner {
            width: 0;
            opacity: 0;
            pointer-events: none;
            border: none;
            padding: 0 !important;
        }

        .preview-wrapper {
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
        }

        .preview-wrapper.collapsed {
            width: 0 !important;
        }

        .collapse-btn {
            position: absolute;
            z-index: 60;
            width: 24px;
            height: 24px;
            background: #4E3629;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 2px solid white;
            transition: background 0.2s;
        }

        .collapse-btn:hover {
            background: #36251b;
        }

        .collapse-btn.left-pane-btn {
            right: -12px;
        }

        .collapse-btn.right-pane-btn {
            left: -12px;
        }

        .resizer {
            width: 10px;
            cursor: col-resize;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            margin: 0 -5px;
        }

        .resizer:hover,
        .resizer.active {
            background-color: rgba(78, 54, 41, 0.1);
        }

        .iframe-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            background: #e5e7eb;
            padding: 8px;
            border-radius: 6px 6px 0 0;
            border: 1px solid #ccc;
            border-bottom: none;
        }

        .tool-btn {
            background: white;
            border: 1px solid #ccc;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #374151;
        }

        .tool-btn:hover {
            background: #4E3629;
            color: white;
            border-color: #4E3629;
        }

        .editor-box {
            min-height: 150px;
            border: 1px solid #ccc;
            padding: 20px;
            background: white;
            border-radius: 0 0 6px 6px;
            overflow-y: auto;
            height: 50vh;
            max-height: none;
            font-family: 'Georgia', serif;
            line-height: 1.6;
            resize: vertical;
        }

        /* MS Word Style Parity Undoing Tailwind Resets */
        .editor-box p {
            margin-bottom: 1rem;
        }

        .editor-box ul {
            list-style-type: disc;
            padding-left: 2rem;
            margin-bottom: 1rem;
        }

        .editor-box ol {
            list-style-type: decimal;
            padding-left: 2rem;
            margin-bottom: 1rem;
        }

        .editor-box h1,
        .editor-box h2,
        .editor-box h3,
        .editor-box h4 {
            font-weight: bold;
            margin-bottom: 0.5rem;
            margin-top: 1.5rem;
        }

        .editor-box h1 {
            font-size: 2em;
        }

        .editor-box h2 {
            font-size: 1.5em;
        }

        .editor-box h3 {
            font-size: 1.17em;
        }

        .editor-box:focus {
            outline: 2px solid #4E3629;
            outline-offset: -2px;
        }

        .editor-box img {
            max-width: 100%;
            display: inline-block;
            cursor: pointer;
            transition: outline 0.2s;
        }

        .editor-box img.selected-img {
            outline: 3px solid #4E3629;
        }

        #img-toolbar {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            padding: 4px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 250px;
        }

        #img-toolbar.active {
            display: flex;
        }

        .draggable-item {
            transition: all 0.2s;
            border: 1px solid transparent;
            background: white;
        }

        .draggable-item:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
        }

        .dragging {
            opacity: 0.5;
            background: #e5e7eb;
            border: 2px dashed #4E3629;
        }

        .drag-over {
            border-top: 2px solid #4E3629;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 6px 12px;
            cursor: pointer;
            background: #4E3629;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
        }

        select.tool-select {
            height: 30px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 0 5px;
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-gray-200">

    <div class="h-20 bg-white flex justify-between items-center px-6 shadow-md z-30 relative">
        <h1 class="text-2xl font-bold text-[#4E3629]">How's Hudson Admin</h1>
        <div class="flex gap-4">
            <button onclick="reopenAllTabs()"
                class="px-4 py-2 rounded bg-[#4E3629] text-white text-sm font-bold shadow transition hover:bg-[#36251b]">Reopen
                All Tabs</button>
            <button onclick="togglePreview()" id="btn-toggle"
                class="px-4 py-2 rounded bg-[#4E3629] text-white text-sm font-bold shadow transition hover:bg-[#36251b]">Toggle
                Full
                Preview</button>
            <button onclick="saveData()"
                class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded shadow font-bold transition">💾 Save
                Changes</button>
        </div>
    </div>

    <div id="main-container">
        <div id="pane-content-wrap" class="pane-wrapper">
            <div class="pane-inner p-4">
                <h2 class="font-bold text-lg mb-2 text-[#4E3629]">Content</h2>
                <div class="overflow-y-auto flex-1 pr-1">
                    <div class="cursor-pointer flex justify-between items-center mb-2"
                        onclick="toggleSidebarSection('settings-section', this)">
                        <p class="text-xs text-gray-500 uppercase font-bold tracking-wider m-0">Site Settings</p>
                        <span class="text-gray-400 text-xs transform transition-transform duration-200">&#9660;</span>
                    </div>
                    <div id="settings-section" class="space-y-1 mb-4 overflow-hidden transition-all duration-300">
                        <div onclick="loadHighlights()"
                            class="p-2 rounded bg-gray-50 hover:bg-gray-200 cursor-pointer text-sm font-bold text-gray-700">
                            ✨ Edit Highlights Section</div>
                        <div onclick="loadEssentials()"
                            class="p-2 rounded bg-gray-50 hover:bg-gray-200 cursor-pointer text-sm font-bold text-gray-700">
                            🛍️ Edit Essentials Section</div>
                        <div onclick="loadStory()"
                            class="p-2 rounded bg-gray-50 hover:bg-gray-200 cursor-pointer text-sm font-bold text-gray-700">
                            📖 Edit Hudson's Story</div>
                        <div onclick="loadFamily()"
                            class="p-2 rounded bg-gray-50 hover:bg-gray-200 cursor-pointer text-sm font-bold text-gray-700">
                            👥 Edit Family Section</div>
                        <div onclick="loadFooter()"
                            class="p-2 rounded bg-gray-50 hover:bg-gray-200 cursor-pointer text-sm font-bold text-gray-700">
                            🔗 Edit Footer & Socials</div>
                    </div>

                    <div class="cursor-pointer flex justify-between items-center mb-2"
                        onclick="toggleSidebarSection('posts-section', this)">
                        <p class="text-xs text-gray-500 uppercase font-bold tracking-wider m-0">Posts</p>
                        <span class="text-gray-400 text-xs transform transition-transform duration-200">&#9660;</span>
                    </div>
                    <div id="posts-section" class="mb-4 overflow-hidden transition-all duration-300">
                        <div id="post-list" class="space-y-1 mb-2"></div>
                        <button onclick="createNewPost()"
                            class="w-full bg-[#E6DCD2] text-[#4E3629] py-2 rounded text-sm font-bold hover:bg-[#d4c5b5]">+
                            New Post</button>
                    </div>

                    <div class="cursor-pointer flex justify-between items-center mb-2"
                        onclick="toggleSidebarSection('products-section', this)">
                        <p class="text-xs text-gray-500 uppercase font-bold tracking-wider m-0">Products</p>
                        <span class="text-gray-400 text-xs transform transition-transform duration-200">&#9660;</span>
                    </div>
                    <div id="products-section" class="mb-4 overflow-hidden transition-all duration-300">
                        <div id="product-list" class="space-y-1 mb-2"></div>
                        <button onclick="createNewProduct()"
                            class="w-full bg-[#E6DCD2] text-[#4E3629] py-2 rounded text-sm font-bold hover:bg-[#d4c5b5]">+
                            New Product</button>
                    </div>
                </div>
            </div>
            <div onclick="togglePane('pane-content-wrap', this, '◀', '▶')"
                onmousedown="startResize(event, 'pane-content-wrap', 'pane-editor-wrap')"
                class="collapse-btn left-pane-btn" style="top: 20px;">◀
            </div>
        </div>

        <div class="resizer" id="resizer-1" onmousedown="startResize(event, 'pane-content-wrap', 'pane-editor-wrap')">
        </div>

        <div id="pane-editor-wrap" class="pane-wrapper">
            <div class="pane-inner p-4 overflow-y-auto">
                <div id="editor-panel">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <p>Select an item from the left to start editing.</p>
                    </div>
                </div>
            </div>
            <div onclick="togglePane('pane-editor-wrap', this, '◀', '▶')"
                onmousedown="startResize(event, 'pane-editor-wrap', 'pane-preview-wrap')"
                class="collapse-btn left-pane-btn" style="top: 60px;">◀
            </div>
        </div>

        <div class="resizer" id="resizer-2" onmousedown="startResize(event, 'pane-editor-wrap', 'pane-preview-wrap')">
        </div>

        <div id="pane-preview-wrap" class="pane-wrapper">
            <div onclick="togglePane('pane-preview-wrap', this, '▶', '◀')"
                onmousedown="startResize(event, 'pane-editor-wrap', 'pane-preview-wrap')"
                class="collapse-btn right-pane-btn" style="top: 100px;">▶</div>
            <div class="pane-inner">
                <div id="iframe-blocker" class="iframe-overlay"></div>
                <div class="absolute top-0 left-0 bg-[#4E3629] text-white text-xs px-2 py-1 z-10 opacity-90 shadow">
                    Live
                    Preview</div>
                <iframe id="preview-frame" src="Index.html" class="w-full h-full border-none block"></iframe>
            </div>
        </div>
    </div>

    <div id="img-toolbar">
        <button onclick="setImgFit('fill')"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">Stretch</button>
        <button onclick="setImgFit('cover')"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">Crop</button>
        <button onclick="setImgFit('contain')"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">Contain</button>
        <button onclick="changeImgWidth(20)"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">W+</button>
        <button onclick="changeImgWidth(-20)"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">W-</button>
        <button onclick="changeImgHeight(20)"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">H+</button>
        <button onclick="changeImgHeight(-20)"
            class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded border">H-</button>
    </div>

    <script>
        // INIT
        if (typeof siteData === 'undefined') {
            var siteData = { posts: [], products: [] };
            console.warn("siteData not found. Initializing empty.");
        }

        // DEFAULTS
        if (!siteData.highlights) siteData.highlights = { title: "Highlights", disclaimer: "" };
        if (!siteData.essentials) siteData.essentials = { title: "Essentials", disclaimer: "(Disclosure: As an Amazon Associate, I earn from qualifying purchases.)" };
        if (!siteData.story) siteData.story = { title: "Hudson's Story", content: "<p>Write your story here...</p>", image: "HudsonStory.jpg" };
        if (!siteData.family) siteData.family = { title: "The Humans", description: "<p>We aren't just owners...</p>", modalDescription: "<p>More info...</p>", buttonText: "Meet Family", image: "Family.jpg", modalImage: "Family.jpg" };
        if (!siteData.footer) siteData.footer = [];
        if (!siteData.footerText) siteData.footerText = { title: "How's Hudson", copyright: "© 2025.", privacy: "<p>Privacy...</p>", terms: "<p>Terms...</p>" };

        let debounceTimer;
        let lastFocusedEditor = null;

        function triggerUpdate() { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => { updatePreview(); }, 300); }

        const blocker = document.getElementById('iframe-blocker');
        let dragWasResizing = false;
        let dragStartX = 0;
        let draggedPane1 = null;
        let draggedPane2 = null;
        let draggedPane1StartWidth = 0;
        let draggedPane2StartWidth = 0;

        function startResize(e, pane1Id, pane2Id) {
            dragWasResizing = false;
            dragStartX = e.clientX;
            draggedPane1 = document.getElementById(pane1Id);
            draggedPane2 = document.getElementById(pane2Id);
            if (!draggedPane1 || !draggedPane2) return;

            if (draggedPane1.classList.contains('collapsed') || draggedPane2.classList.contains('collapsed')) return;

            const tabs = [document.getElementById('pane-content-wrap'), document.getElementById('pane-editor-wrap'), document.getElementById('pane-preview-wrap')];
            const openTabs = tabs.filter(t => !t.classList.contains('collapsed'));
            openTabs.forEach(t => {
                const w = t.offsetWidth;
                t.style.flex = `${w} 1 0%`;
            });

            draggedPane1StartWidth = draggedPane1.offsetWidth;
            draggedPane2StartWidth = draggedPane2.offsetWidth;

            if (blocker) blocker.style.display = 'block';
            document.body.style.cursor = 'col-resize';

            document.addEventListener('mousemove', handleResizeMove);
            document.addEventListener('mouseup', handleResizeUp);
        }

        function handleResizeMove(e) {
            if (Math.abs(e.clientX - dragStartX) > 4) {
                dragWasResizing = true;
            }
            if (!dragWasResizing) return;

            const deltaX = e.clientX - dragStartX;

            let newW1 = draggedPane1StartWidth + deltaX;
            let newW2 = draggedPane2StartWidth - deltaX;

            if (newW1 > 50 && newW2 > 50) {
                draggedPane1.style.flex = `${newW1} 1 0%`;
                draggedPane2.style.flex = `${newW2} 1 0%`;
            }
        }

        function handleResizeUp(e) {
            document.body.style.cursor = 'default';
            if (blocker) blocker.style.display = 'none';
            document.removeEventListener('mousemove', handleResizeMove);
            document.removeEventListener('mouseup', handleResizeUp);
            setTimeout(() => { dragWasResizing = false; }, 50);
        }

        function equalizeOpenTabs() {
            const tabs = [document.getElementById('pane-content-wrap'), document.getElementById('pane-editor-wrap'), document.getElementById('pane-preview-wrap')];
            const openTabs = tabs.filter(t => !t.classList.contains('collapsed'));
            openTabs.forEach(t => {
                t.style.flex = '1 1 0%';
            });
        }

        function reopenAllTabs() {
            const tabs = [document.getElementById('pane-content-wrap'), document.getElementById('pane-editor-wrap'), document.getElementById('pane-preview-wrap')];
            tabs.forEach(t => {
                t.classList.remove('collapsed');
                t.style.flex = '1 1 0%';
            });

            document.querySelectorAll('.collapse-btn.left-pane-btn').forEach(btn => btn.innerText = '◀');
            document.querySelector('.collapse-btn.right-pane-btn').innerText = '▶';

            if (isFullPreview) togglePreview();
        }

        function toggleSidebarSection(id, headerEl) {
            const el = document.getElementById(id);
            const icon = headerEl.querySelector('span');
            if (el.style.display === 'none') {
                el.style.display = 'block';
                icon.style.transform = 'rotate(0deg)';
            } else {
                el.style.display = 'none';
                icon.style.transform = 'rotate(-90deg)';
            }
        }

        let isFullPreview = false;
        function togglePreview() {
            isFullPreview = !isFullPreview;
            const btn = document.getElementById('btn-toggle');

            const paneContent = document.getElementById('pane-content-wrap');
            const paneEditor = document.getElementById('pane-editor-wrap');
            const resizer1 = document.getElementById('resizer-1');
            const resizer2 = document.getElementById('resizer-2');
            const panePreview = document.getElementById('pane-preview-wrap');

            if (isFullPreview) {
                paneContent.style.display = 'none';
                paneEditor.style.display = 'none';
                resizer1.style.display = 'none';
                resizer2.style.display = 'none';
                panePreview.style.flex = '1 1 0%';
                panePreview.classList.remove('collapsed');
                document.querySelector('.collapse-btn.right-pane-btn').innerText = '▶';

                btn.innerText = "Exit Full Preview";
                btn.classList.replace('bg-[#4E3629]', 'bg-gray-500');
            } else {
                paneContent.style.display = 'flex';
                paneEditor.style.display = 'flex';
                resizer1.style.display = 'flex';
                resizer2.style.display = 'flex';
                equalizeOpenTabs();

                btn.innerText = "Toggle Full Preview";
                btn.classList.replace('bg-gray-500', 'bg-[#4E3629]');
            }
        }

        let currentEditingId = null;
        let currentType = null;

        function updatePreview() { document.getElementById('preview-frame').contentWindow.postMessage(siteData, '*'); }

        function handleImageUpload(input, target) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const base64String = e.target.result;
                    if (currentType === 'post') {
                        if (target === 'banner') {
                            siteData.posts[currentEditingId].bannerImage = base64String;
                        } else {
                            siteData.posts[currentEditingId].image = base64String;
                        }
                    }
                    if (currentType === 'product') siteData.products[currentEditingId].image = base64String;
                    if (currentType === 'story') siteData.story.image = base64String;
                    if (currentType === 'family') {
                        if (target === 'main') siteData.family.image = base64String;
                        if (target === 'modal') siteData.family.modalImage = base64String;
                    }
                    const previewId = target ? `img-preview-${target}` : 'img-preview';
                    const el = document.getElementById(previewId);
                    if (el) el.src = base64String;
                    triggerUpdate();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleBannerUpload() {
            const isSame = document.getElementById('edit-banner-same').checked;
            document.getElementById('banner-upload-section').style.display = isSame ? 'none' : 'flex';
            if (isSame) {
                siteData.posts[currentEditingId].bannerImage = null;
                triggerUpdate();
            }
        }

        function renderSidebar() {
            const postList = document.getElementById('post-list');
            const prodList = document.getElementById('product-list');
            postList.innerHTML = ''; prodList.innerHTML = '';

            if (siteData.posts) siteData.posts.forEach((post, index) => postList.appendChild(createDraggableItem(post.title, index, 'post')));
            if (siteData.products) siteData.products.forEach((prod, index) => prodList.appendChild(createDraggableItem(prod.title, index, 'product')));
            updatePreview();
        }

        function createDraggableItem(title, index, type) {
            const div = document.createElement('div');
            div.className = "draggable-item p-2 rounded flex justify-between items-center text-sm cursor-pointer border border-gray-200 shadow-sm mb-1";
            div.draggable = true; div.dataset.index = index; div.dataset.type = type;
            div.innerHTML = `<div class="flex items-center w-full overflow-hidden pointer-events-none"><span class="drag-handle text-gray-400 mr-2">⋮⋮</span><span class="truncate select-none ml-2 text-gray-700 font-medium">${title}</span></div><span class="delete-btn text-xs text-red-400 font-bold px-2 hover:text-red-600 z-10" onclick="deleteItem('${type}', ${index}, event)">×</span>`;
            div.onclick = (e) => { if (e.target.classList.contains('delete-btn')) return; if (type === 'post') loadPost(index); else loadProduct(index); };
            div.addEventListener('dragstart', handleDragStart); div.addEventListener('dragover', handleDragOver); div.addEventListener('drop', handleDrop);
            div.addEventListener('dragenter', (e) => div.classList.add('drag-over')); div.addEventListener('dragleave', (e) => div.classList.remove('drag-over'));
            return div;
        }

        let dragSrcEl = null;
        function handleDragStart(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('sourceIndex', this.dataset.index); e.dataTransfer.setData('type', this.dataset.type); this.classList.add('dragging'); }
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
        function handleDrop(e) { e.stopPropagation(); const targetType = this.dataset.type; const sourceType = e.dataTransfer.getData('type'); if (targetType !== sourceType) return false; const sourceIndex = parseInt(e.dataTransfer.getData('sourceIndex')); const targetIndex = parseInt(this.dataset.index); if (dragSrcEl !== this) { const list = targetType === 'post' ? siteData.posts : siteData.products; const item = list[sourceIndex]; list.splice(sourceIndex, 1); list.splice(targetIndex, 0, item); renderSidebar(); } return false; }

        // --- EDITORS ---

        function trackFocus(id) { lastFocusedEditor = id; }

        function loadHighlights() {
            currentType = 'highlights'; currentEditingId = null;
            const pCount = siteData.highlights.count !== undefined ? siteData.highlights.count : 4;
            const hSize = siteData.highlights.size || 'medium';
            document.getElementById('editor-panel').innerHTML = `
                <h2 class="text-lg font-bold mb-3 text-[#4E3629] border-b pb-2">Edit Highlights Section</h2>
                <div class="space-y-4">
                    <div><label class="text-xs font-bold uppercase text-gray-500">Section Title</label><input type="text" id="high-title" class="w-full border p-2 rounded text-sm" value="${siteData.highlights.title}"></div>
                    <div><label class="text-xs font-bold uppercase text-gray-500">Disclaimer / Subtitle</label><input type="text" id="high-disc" class="w-full border p-2 rounded text-sm" value="${siteData.highlights.disclaimer}" placeholder="Optional text underneath header"></div>
                    <div class="bg-gray-50 p-3 rounded border">
                        <label class="text-xs font-bold uppercase text-gray-600 mb-2 block">Display Settings</label>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <span class="text-xs text-gray-500">Posts on Home Page (0 to show all)</span>

        function generateSlug() {
            const titleInput = document.getElementById('edit-title');
            const slugInput = document.getElementById('edit-slug');
            if (titleInput && slugInput) {
                const raw = titleInput.value;
                const slug = raw.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');
                slugInput.value = slug;
                updateDataFromInputs();
            }
        }

        function updateDataFromInputs() {
            if (currentType === 'post') {
                const p = siteData.posts[currentEditingId];
                p.title = document.getElementById('edit-title').value;
                p.date = document.getElementById('edit-date').value;
                p.category = document.getElementById('edit-cat').value;
                p.content = document.getElementById('edit-content').innerHTML;

                const sInput = document.getElementById('edit-slug');
                if (sInput) p.slug = sInput.value;

                const sidebarItem = document.querySelector(`[data-index="${currentEditingId}"][data-type="post"] span.ml-2`); if (sidebarItem) sidebarItem.innerText = p.title;
            } else if (currentType === 'product') {
                const p = siteData.products[currentEditingId];
                p.title = document.getElementById('prod-title').value;
                p.brand = document.getElementById('prod-brand').value;
                p.link = document.getElementById('prod-link').value;
                p.whyBuy = document.getElementById('prod-why').value;
                const sidebarItem = document.querySelector(`[data-index="${currentEditingId}"][data-type="product"] span.ml-2`); if (sidebarItem) sidebarItem.innerText = p.title;
            } else if (currentType === 'highlights') {
                siteData.highlights.title = document.getElementById('high-title').value;
                siteData.highlights.disclaimer = document.getElementById('high-disc').value;
                siteData.highlights.count = parseInt(document.getElementById('high-post-count').value) || 0;
                siteData.highlights.size = document.getElementById('high-post-size').value;
                siteData.highlights.customWidth = parseInt(document.getElementById('high-custom-w').value) || 300;
            } else if (currentType === 'essentials') {
                siteData.essentials.title = document.getElementById('ess-title').value;
                siteData.essentials.disclaimer = document.getElementById('ess-disc').value;
                if (!siteData.productSettings) siteData.productSettings = {};
                siteData.productSettings.count = parseInt(document.getElementById('ess-prod-count').value) || 0;
                siteData.productSettings.size = document.getElementById('ess-prod-size').value;

                const cW = document.getElementById('ess-custom-w') ? parseInt(document.getElementById('ess-custom-w').value) : 300;
                const cH = document.getElementById('ess-custom-h') ? parseInt(document.getElementById('ess-custom-h').value) : 450;
                siteData.productSettings.customWidth = isNaN(cW) ? 300 : cW;
                siteData.productSettings.customHeight = isNaN(cH) ? 450 : cH;
                siteData.productSettings.textHeight = document.getElementById('ess-text-h') ? (parseInt(document.getElementById('ess-text-h').value) || 0) : 140;
                siteData.productSettings.imageFit = document.getElementById('ess-img-fit') ? document.getElementById('ess-img-fit').value : 'cover';
            } else if (currentType === 'story') {
                siteData.story.title = document.getElementById('story-title').value;
                siteData.story.content = document.getElementById('edit-content').innerHTML;
            } else if (currentType === 'family') {
                siteData.family.title = document.getElementById('fam-title').value;
                siteData.family.description = document.getElementById('edit-content-main').innerHTML;
                siteData.family.modalDescription = document.getElementById('edit-content-modal').innerHTML;
                siteData.family.buttonText = document.getElementById('fam-btn').value;
            } else if (currentType === 'legal-privacy') {
                siteData.footerText.privacy = document.getElementById('edit-content').innerHTML;
            } else if (currentType === 'legal-terms') {
                siteData.footerText.terms = document.getElementById('edit-content').innerHTML;
            }
            triggerUpdate();
        }

        function formatDoc(cmd, value = null) {
            if (lastFocusedEditor && document.getElementById(lastFocusedEditor)) {
                document.getElementById(lastFocusedEditor).focus();
            }
            document.execCommand(cmd, false, value);
            updateDataFromInputs();
        }
        function addLink() {
            const url = prompt("Enter URL:", "https://");
            if (url) {
                formatDoc('createLink', url);
                if (lastFocusedEditor && document.getElementById(lastFocusedEditor)) {
                    document.getElementById(lastFocusedEditor).querySelectorAll('a:not([target])').forEach(a => {
                        a.setAttribute("target", "_blank");
                    });
                    updateDataFromInputs();
                }
            }
        }

        function insertInlineImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    formatDoc('insertImage', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
            input.value = '';
        }

        function insertColumns(numCols) {
            if (!numCols) return;
            let colsHtml = `<div class="grid grid-cols-${numCols} gap-4 mb-4">`;
            for (let i = 0; i < numCols; i++) {
                colsHtml += `<div class="border border-dashed border-gray-400 p-2 min-h-[50px]">Col ${i + 1}</div>`;
            }
            colsHtml += `</div><p><br></p>`;
            formatDoc('insertHTML', colsHtml);
        }

        let activeImage = null;
        document.addEventListener('click', function (e) {
            const tb = document.getElementById('img-toolbar');
            if (tb) {
                if (e.target.tagName === 'IMG' && e.target.closest('.editor-box')) {
                    document.querySelectorAll('.editor-box img.selected-img').forEach(img => img.classList.remove('selected-img'));
                    activeImage = e.target;
                    activeImage.classList.add('selected-img');

                    const rect = activeImage.getBoundingClientRect();
                    tb.style.top = (window.scrollY + rect.top - tb.offsetHeight - 5) + 'px';
                    tb.style.left = (window.scrollX + rect.left) + 'px';
                    tb.classList.add('active');

                    if (!activeImage.style.width) activeImage.style.width = activeImage.clientWidth + 'px';
                    if (!activeImage.style.height) activeImage.style.height = activeImage.clientHeight + 'px';
                } else if (!e.target.closest('#img-toolbar')) {
                    if (activeImage) activeImage.classList.remove('selected-img');
                    activeImage = null;
                    tb.classList.remove('active');
                }
            }
        });

        function setImgFit(fit) {
            if (activeImage) { activeImage.style.objectFit = fit; updateDataFromInputs(); triggerUpdate(); }
        }
        function changeImgWidth(amt) {
            if (activeImage) {
                let currentW = activeImage.clientWidth;
                activeImage.style.width = (currentW + amt) + 'px';
                updateDataFromInputs();
                triggerUpdate();
            }
        }
        function changeImgHeight(amt) {
            if (activeImage) {
                let currentH = activeImage.clientHeight;
                activeImage.style.height = (currentH + amt) + 'px';
                updateDataFromInputs();
                triggerUpdate();
            }
        }

        function createNewPost() { siteData.posts.unshift({ id: Date.now(), slug: "new-story", title: "New Story", category: "General", readTime: "5 min", date: "Jan 1, 2025", image: "https://via.placeholder.com/300", summary: "...", content: "<p>Start writing...</p>" }); renderSidebar(); loadPost(0); }
        function createNewProduct() { siteData.products.unshift({ title: "New Item", brand: "Brand", image: "https://via.placeholder.com/300", link: "#", whyBuy: "This is a great product because..." }); renderSidebar(); loadProduct(0); }
        function deleteItem(type, index, e) { e.stopPropagation(); if (confirm("Delete this item?")) { if (type === 'post') siteData.posts.splice(index, 1); if (type === 'product') siteData.products.splice(index, 1); renderSidebar(); document.getElementById('editor-panel').innerHTML = ''; updatePreview(); } }

        async function saveData() {
            const dataStr = "var siteData = " + JSON.stringify(siteData, null, 4) + ";";
            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        id: 'hudson-admin-save',
                        suggestedName: 'content.js',
                        types: [{ description: 'JavaScript File', accept: { 'text/javascript': ['.js'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(dataStr);
                    await writable.close();
                    alert("Saved! The content.js file has been updated.");
                } catch (err) { if (err.name !== 'AbortError') { console.error(err); alert("Error saving file."); } }
            } else {
                const blob = new Blob([dataStr], { type: "text/javascript" });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "content.js"; document.body.appendChild(a); a.click(); document.body.removeChild(a); alert("File downloaded.");
            }
        }

        function togglePane(paneId, btnElem, leftIcon, rightIcon) {
            if (dragWasResizing) return;
            const paneWrapper = document.getElementById(paneId);
            paneWrapper.classList.toggle('collapsed');
            if (paneWrapper.classList.contains('collapsed')) {
                btnElem.innerText = rightIcon;
            } else {
                btnElem.innerText = leftIcon;
            }
            equalizeOpenTabs();
        }

        function togglePreviewPane(paneId, btnElem) {
            togglePane(paneId, btnElem, '▶', '◀');
        }

        function applyStyle(node, prop, value) {
            if (prop === 'lineHeight') {
                node.style.lineHeight = value;
            } else if (prop === 'marginBottom') {
                node.style.marginBottom = value;
            } else if (prop === 'marginTop') {
                node.style.marginTop = value;
            } else if (prop === 'removeSpacing') {
                node.style.marginTop = '0';
                node.style.marginBottom = '0';
                node.style.lineHeight = '1.0';
            }
        }

        function applyStyleToSelectedBlocks(styleProp, value) {
            const editor = document.getElementById(lastFocusedEditor);
            if (!editor) return;

            const sel = window.getSelection();
            if (sel.rangeCount === 0) return;
            const range = sel.getRangeAt(0);

            const blocks = Array.from(editor.querySelectorAll('p, div, h1, h2, h3, h4, h5, h6, li, blockquote'));
            let modified = false;

            if (range.collapsed) {
                let node = sel.focusNode;
                while (node && node !== editor && !['P', 'DIV', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI', 'BLOCKQUOTE'].includes(node.tagName)) {
                    node = node.parentNode;
                }
                if (node && node !== editor) {
                    applyStyle(node, styleProp, value);
                    modified = true;
                }
            } else {
                blocks.forEach(block => {
                    if (sel.containsNode(block, true)) {
                        applyStyle(block, styleProp, value);
                        modified = true;
                    }
                });
            }

            if (!modified) {
                document.execCommand('formatBlock', false, 'p');
                applyStyleToSelectedBlocks(styleProp, value);
                return;
            }
            updateDataFromInputs();
        }

        function setLineSpacing(val) {
            if (!val) return;
            if (lastFocusedEditor && document.getElementById(lastFocusedEditor)) {
                document.getElementById(lastFocusedEditor).focus();
            }
            if (val === 'add-before') applyStyleToSelectedBlocks('marginTop', '1rem');
            else if (val === 'add-after') applyStyleToSelectedBlocks('marginBottom', '1rem');
            else if (val === 'remove-space') applyStyleToSelectedBlocks('removeSpacing', '');
            else applyStyleToSelectedBlocks('lineHeight', val);
        }

        setTimeout(() => { renderSidebar(); }, 500);
    </script>
